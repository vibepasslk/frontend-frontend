<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in - VibePass.lk</title>
  <meta name="description" content="Sign in to VibePass.lk to manage tickets, invitations, organizer dashboards and scanner access." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#7B5CF0" />
  <link rel="canonical" href="https://vibepass.lk/login" />
  <meta property="og:site_name" content="VibePass.lk" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sign in - VibePass.lk" />
  <meta property="og:description" content="Sign in to VibePass.lk to manage tickets, invitations, organizer dashboards and scanner access." />
  <meta property="og:url" content="https://vibepass.lk/login" />
  <meta property="og:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sign in - VibePass.lk" />
  <meta name="twitter:description" content="Sign in to VibePass.lk to manage tickets, invitations, organizer dashboards and scanner access." />
  <meta name="twitter:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <link rel="icon" href="../assets/images/Logo-192.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">
        <img src="../assets/images/Logo-192.png" alt="VibePass" />
        <a href="../index.html" class="logo-text" style="display:block;font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);">
          VibePass<span style="color:var(--primary-light)">.lk</span>
        </a>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to buy tickets, manage invitations, or run your event dashboard.</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            Password
            <a href="forgot-password.html" style="float:right;font-size:13px;color:var(--primary-light);">Forgot?</a>
          </label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Your password" required />
        </div>

        <button class="form-submit" type="submit">Sign in</button>
      </form>

      <div class="form-divider">or continue with</div>
      <a class="btn btn-ghost" href="#" data-google-login style="width:100%;justify-content:center;gap:10px;padding:11px;">
        <i class="ti ti-brand-google" style="font-size:18px;"></i>
        Continue with Google
      </a>

      <div class="auth-alt">
        Don't have an account?
        <a href="register.html">Sign up free</a>
      </div>
    </section>
  </main>

  <script src="../assets/js/api.js"></script>
</body>
</html>
