<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation builder - VibePass.lk</title>
  <meta name="description" content="Design a digital invitation, add event details and share it with guests from VibePass.lk." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#7B5CF0" />
  <link rel="canonical" href="https://vibepass.lk/invitation-builder" />
  <meta property="og:site_name" content="VibePass.lk" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Invitation builder - VibePass.lk" />
  <meta property="og:description" content="Design a digital invitation, add event details and share it with guests from VibePass.lk." />
  <meta property="og:url" content="https://vibepass.lk/invitation-builder" />
  <meta property="og:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Invitation builder - VibePass.lk" />
  <meta name="twitter:description" content="Design a digital invitation, add event details and share it with guests from VibePass.lk." />
  <meta name="twitter:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <link rel="icon" href="../assets/images/Logo-192.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <img src="../assets/images/Logo-192.png" alt="VibePass" class="logo-img" />
        <span class="logo-text">VibePass<span class="logo-lk">.lk</span></span>
      </a>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-ghost">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <section class="container" style="padding:42px 24px 72px;">
      <div class="builder-layout">
        <aside class="builder-sidebar">
          <div class="builder-section-title">Invitation details</div>
          <form id="inviteForm">
            <div class="form-group">
              <label class="form-label" for="title">Event title</label>
              <input class="form-input" id="title" name="title" placeholder="Nimasha's Birthday Night" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="event_date">Date and time</label>
              <input class="form-input" id="event_date" name="event_date" type="datetime-local" />
            </div>
            <div class="form-group">
              <label class="form-label" for="venue">Venue</label>
              <input class="form-input" id="venue" name="venue" placeholder="Colombo" />
            </div>
            <div class="form-group">
              <label class="form-label" for="message">Message</label>
              <textarea class="form-input" id="message" name="message" rows="4" placeholder="Dress bold. Arrive early."></textarea>
            </div>
            <button class="form-submit" type="submit">Create invitation</button>
          </form>
        </aside>

        <section class="builder-preview">
          <div style="max-width:420px;text-align:center;">
            <div class="section-label">Digital invite</div>
            <h1 id="previewTitle" style="font-size:42px;">Your night starts here</h1>
            <p id="previewMeta" style="color:var(--text-2);margin:14px 0;">Date and venue preview</p>
            <p id="previewMessage" style="color:var(--text-3);">Personalize the fields to preview your guest invitation.</p>
            <div id="shareResult" style="margin-top:24px;"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="../assets/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => VibePass.requireAuth());
    const form = document.getElementById('inviteForm');
    ['title', 'event_date', 'venue', 'message'].forEach((id) => {
      document.getElementById(id).addEventListener('input', updatePreview);
    });
    form.addEventListener('submit', createInvite);

    function updatePreview() {
      document.getElementById('previewTitle').textContent = form.title.value || 'Your night starts here';
      document.getElementById('previewMeta').textContent = `${form.event_date.value || 'Date pending'} - ${form.venue.value || 'Venue pending'}`;
      document.getElementById('previewMessage').textContent = form.message.value || 'Personalize the fields to preview your guest invitation.';
    }

    async function createInvite(event) {
      event.preventDefault();
      const button = event.target.querySelector('[type="submit"]');
      VibePass.setLoading(button, true, 'Creating...');
      try {
        const data = await VibePass.request('/invitations', {
          method: 'POST',
          body: {
            title: form.title.value,
            event_date: form.event_date.value,
            venue: form.venue.value,
            message: form.message.value,
            template_id: new URLSearchParams(location.search).get('template') || 'nightlife'
          }
        });
        const url = `${location.origin}${location.pathname.replace('invitation-builder.html', 'invitation.html')}?i=${data.invitation.share_link}`;
        document.getElementById('shareResult').innerHTML = `<a class="btn btn-primary" href="${url}">Open invitation</a>`;
        VibePass.toast('Invitation created', 'success');
      } catch (error) {
        VibePass.toast(error.message, 'error');
      } finally {
        VibePass.setLoading(button, false);
      }
    }
  </script>
</body>
</html>
