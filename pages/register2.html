<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — VibePass.lk</title>
  <meta name="description" content="VibePass.lk event ticketing, organizer management and digital invitation tools for Sri Lanka." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#7B5CF0" />
  <link rel="canonical" href="https://vibepass.lk/pages/register2" />
  <meta property="og:site_name" content="VibePass.lk" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Create Account — VibePass.lk" />
  <meta property="og:description" content="VibePass.lk event ticketing, organizer management and digital invitation tools for Sri Lanka." />
  <meta property="og:url" content="https://vibepass.lk/pages/register2" />
  <meta property="og:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Create Account — VibePass.lk" />
  <meta name="twitter:description" content="VibePass.lk event ticketing, organizer management and digital invitation tools for Sri Lanka." />
  <meta name="twitter:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <link rel="icon" href="../assets/images/Logo-192.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:480px;">
      <div class="auth-logo">
        <img src="../assets/images/Logo-192.png" alt="VibePass" />
        <a href="../index.html" class="logo-text" style="display:block;font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);">VibePass<span style="color:var(--primary-light)">.lk</span></a>
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Join VibePass — free forever</p>

      <p style="font-size:13px;color:var(--text-3);margin-bottom:10px;">I am joining as a...</p>
      <div class="role-selector" id="roleSelector">
        <button class="role-btn selected" data-role="customer" onclick="selectRole('customer')">
          <i class="ti ti-ticket"></i> Ticket buyer / Guest
        </button>
        <button class="role-btn" data-role="organizer" onclick="selectRole('organizer')">
          <i class="ti ti-microphone-2"></i> Event organizer
        </button>
      </div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label" for="fname">First name</label>
            <input class="form-input" type="text" id="fname" placeholder="Kasun" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="lname">Last name</label>
            <input class="form-input" type="text" id="lname" placeholder="Silva" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone number (Sri Lanka)</label>
          <input class="form-input" type="tel" id="phone" placeholder="+94 77 123 4567" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" minlength="8" required />
        </div>
        <div id="orgExtra" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="orgName">Organization / Event company name</label>
            <input class="form-input" type="text" id="orgName" placeholder="e.g. Colombo Events Co." />
          </div>
        </div>
        <p style="font-size:12px;color:var(--text-3);margin-bottom:14px;">
          By creating an account, you agree to our <a href="terms.html" style="color:var(--primary-light);">Terms of Service</a> and <a href="privacy.html" style="color:var(--primary-light);">Privacy Policy</a>.
        </p>
        <button class="form-submit" type="submit">Create account</button>
      </form>

      <div class="auth-alt">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = 'customer';

    // Pre-select from URL param
    const params = new URLSearchParams(window.location.search);
    if (params.get('role') === 'organizer') selectRole('organizer');

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('selected', b.dataset.role === role));
      document.getElementById('orgExtra').style.display = role === 'organizer' ? 'block' : 'none';
    }

    function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.form-submit');
      btn.textContent = 'Creating account…';
      btn.disabled = true;
      setTimeout(() => {
        alert('Registration coming soon! The frontend is ready for backend integration.');
        btn.textContent = 'Create account';
        btn.disabled = false;
      }, 1000);
    }
  </script>
</body>
</html>
