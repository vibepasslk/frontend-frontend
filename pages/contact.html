<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - VibePass.lk</title>
  <meta name="description" content="Contact the VibePass.lk team for event ticketing, invitations, support and partnership questions." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#7B5CF0" />
  <link rel="canonical" href="https://vibepass.lk/contact" />
  <meta property="og:site_name" content="VibePass.lk" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact - VibePass.lk" />
  <meta property="og:description" content="Contact the VibePass.lk team for event ticketing, invitations, support and partnership questions." />
  <meta property="og:url" content="https://vibepass.lk/contact" />
  <meta property="og:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact - VibePass.lk" />
  <meta name="twitter:description" content="Contact the VibePass.lk team for event ticketing, invitations, support and partnership questions." />
  <meta name="twitter:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <link rel="icon" href="../assets/images/Logo-192.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar scrolled"><div class="nav-inner"><a href="../index.html" class="logo"><img src="../assets/images/Logo-192.png" alt="VibePass" class="logo-img" /><span class="logo-text">VibePass<span class="logo-lk">.lk</span></span></a><div class="nav-actions"><a href="login.html" class="btn btn-ghost">Sign in</a><a href="register.html" class="btn btn-primary">Get started</a></div></div></nav>
  <main class="auth-page">
    <section class="auth-card" style="max-width:560px;">
      <h1 class="auth-title">Contact support</h1>
      <p class="auth-sub">Send organizer, customer, payment, invitation, or platform support questions.</p>
      <form id="contactForm">
        <div class="form-group"><label class="form-label" for="email">Email</label><input class="form-input" id="email" name="email" type="email" required /></div>
        <div class="form-group"><label class="form-label" for="subject">Subject</label><input class="form-input" id="subject" name="subject" required /></div>
        <div class="form-group"><label class="form-label" for="message">Message</label><textarea class="form-input" id="message" name="message" rows="5" required></textarea></div>
        <button class="form-submit" type="submit">Send message</button>
      </form>
    </section>
  </main>
  <script src="../assets/js/env.js"></script>
  <script type="module" src="../assets/js/api.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = event.target.querySelector('[type="submit"]');
      VibePass.setLoading(button, true, 'Sending...');
      try {
        await VibePass.request('/support', {
          method: 'POST',
          body: {
            email: event.target.email.value,
            subject: event.target.subject.value,
            message: event.target.message.value
          }
        });
        VibePass.toast('Support request sent', 'success');
        event.target.reset();
      } catch (error) {
        VibePass.toast(error.message, 'error');
      } finally {
        VibePass.setLoading(button, false);
      }
    });
  </script>
</body>
</html>
