<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password - VibePass.lk</title>
  <meta name="description" content="Reset your VibePass.lk account password securely." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#7B5CF0" />
  <link rel="canonical" href="https://vibepass.lk/forgot-password" />
  <meta property="og:site_name" content="VibePass.lk" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Forgot password - VibePass.lk" />
  <meta property="og:description" content="Reset your VibePass.lk account password securely." />
  <meta property="og:url" content="https://vibepass.lk/forgot-password" />
  <meta property="og:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forgot password - VibePass.lk" />
  <meta name="twitter:description" content="Reset your VibePass.lk account password securely." />
  <meta name="twitter:image" content="https://vibepass.lk/assets/images/og-image.png" />
  <link rel="icon" href="../assets/images/Logo-192.png" type="image/png" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo"><img src="../assets/images/Logo-192.png" alt="VibePass" /></div>
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-sub">Enter your account email. The backend endpoint is ready for email provider integration.</p>
      <form id="forgotForm">
        <div class="form-group"><label class="form-label" for="email">Email address</label><input class="form-input" id="email" name="email" type="email" required /></div>
        <button class="form-submit" type="submit">Send reset instructions</button>
      </form>
      <div class="auth-alt"><a href="login.html">Back to sign in</a></div>
    </section>
  </main>
  <script src="../assets/js/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = event.target.querySelector('[type="submit"]');
      VibePass.setLoading(button, true, 'Sending...');
      try {
        await VibePass.request('/auth/forgot-password', { method: 'POST', body: { email: event.target.email.value } });
        VibePass.toast('If the account exists, reset instructions will be sent.', 'success');
      } catch (error) {
        VibePass.toast(error.message, 'error');
      } finally {
        VibePass.setLoading(button, false);
      }
    });
  </script>
</body>
</html>
